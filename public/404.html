<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Accord - Decentralized Self-Governance</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect
      // Converts the path after /Communities2/ into a query parameter
      // so that index.html can restore the correct route on load
      var pathSegmentsToKeep = 1; // keep '/Communities2'
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
